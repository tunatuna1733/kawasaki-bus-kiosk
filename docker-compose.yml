services:
  kiosk:
    build: .
    image: kawasaki-bus-kiosk
    container_name: kawasaki-bus-kiosk
    restart: unless-stopped
    ports:
      - "25001:25001"
    environment:
      # Base URL of the Kawasaki GTFS API (required for /api/stops and /api/departures).
      # See https://github.com/tunatuna1733/kawasaki-gtfs-api
      GTFS_API_BASE: ${GTFS_API_BASE:?set GTFS_API_BASE in .env or your environment}
      PORT: 25001
      CONFIG_PATH: /data/config.json
    volumes:
      # Persist the dashboard-written config across restarts and image rebuilds.
      - kiosk-config:/data
    # Lets the container reach a backend running on the host as host.docker.internal.
    # Built in on Docker Desktop (Win/Mac); this mapping is what makes it work on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  kiosk-config:
